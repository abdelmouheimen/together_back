name: Deploy to VPS

on:
  push:
    branches: [main]
  workflow_dispatch: {}

# Never run two deploys at the same time
concurrency:
  group: deploy-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Load SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VPS_SSH_KEY }}

      - name: Trust VPS host key
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "${{ secrets.VPS_HOST }}" >> ~/.ssh/known_hosts

      - name: Sync source to VPS
        run: |
          rsync -az --delete \
            --exclude='.git' \
            --exclude='.env' \
            --exclude='target' \
            ./ "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}:/opt/together_back/"

      - name: Build & (re)start containers
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'cd /opt/together_back && docker compose up -d --build --remove-orphans && docker image prune -f'

      - name: Health check
        run: |
          ssh "${{ secrets.VPS_USER }}@${{ secrets.VPS_HOST }}" \
            'for i in $(seq 1 30); do \
               if curl -fsS http://localhost:8080/actuator/health >/dev/null 2>&1; then \
                 echo "App is healthy"; exit 0; \
               fi; \
               echo "waiting for app... ($i/30)"; sleep 5; \
             done; \
             echo "App did not become healthy in time"; \
             docker compose -f /opt/together_back/docker-compose.yml logs --tail=50 app; \
             exit 1'
